<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enspire - Stream Audio, Redefined</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gradient-blue: linear-gradient(135deg, #007BFF 0%, #00C4FF 100%);
            --text-dark: #333333;
            --text-light: #FFFFFF;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px rgba(0, 0, 0, 0.1);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header Styles */
        header {
            padding: 32px 0;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .logo {
            display: inline-block;
            transition: var(--transition);
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .tagline {
            font-size: 18px;
            font-weight: 400;
            color: var(--text-dark);
            opacity: 0.8;
            transition: var(--transition);
        }

        .tagline:hover {
            opacity: 1;
        }

        /* Hero Section */
        .hero {
            padding: 64px 0;
            text-align: center;
            position: relative;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 24px;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .hero p {
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto 48px;
            color: var(--text-dark);
            opacity: 0.9;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }

        .hero-images {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }

        .hero-img {
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            max-width: 100%;
            height: auto;
        }

        .hero-img:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
        }

        /* CTA Section */
        .cta-section {
            text-align: center;
            padding: 64px 0;
            position: relative;
        }

        .cta-button {
            display: inline-block;
            padding: 16px 40px;
            background: var(--gradient-blue);
            color: var(--text-light);
            font-size: 18px;
            font-weight: 600;
            border-radius: var(--radius-lg);
            text-decoration: none;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .cta-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 100%);
            opacity: 0;
            transition: var(--transition);
        }

        .cta-button:hover::after {
            opacity: 1;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* Footer */
        footer {
            padding: 48px 0 32px;
            text-align: center;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.8s forwards;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .footer-link {
            color: var(--text-dark);
            text-decoration: none;
            font-size: 14px;
            opacity: 0.7;
            transition: var(--transition);
            position: relative;
        }

        .footer-link:hover {
            opacity: 1;
        }

        .footer-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--text-dark);
            transition: var(--transition);
        }

        .footer-link:hover::after {
            width: 100%;
        }

        .copyright {
            font-size: 14px;
            opacity: 0.5;
            transition: var(--transition);
        }

        .copyright:hover {
            opacity: 0.8;
        }

        /* Animations */
        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.4);
            }
            70% {
                box-shadow: 0 0 0 12px rgba(0, 123, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 123, 255, 0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }
            
            .hero p {
                font-size: 16px;
            }
            
            .cta-button {
                padding: 14px 32px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 28px;
            }
            
            .tagline {
                font-size: 16px;
            }
            
            .hero h1 {
                font-size: 28px;
            }
            
            .footer-links {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="logo.png" alt="Enspire Logo" style="width: 200px; height: auto">
            </div>
            <div class="tagline">Inspiration. On-Demand. Just Press Play.</div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Discover Enspire: Your Audio Journey Awaits</h1>
                <p>Bite-sized audio lessons to grow your mind — anytime, anywhere.</p>
                
                <div class="hero-images">
                    <img src="ux_1.png" alt="Enspire App Interface" class="hero-img" style="max-width: 400px;">
                    <img src="ux_2.png" alt="Enspire App Interface" class="hero-img" style="max-width: 410px;">
                </div>
            </div>
        </section>

        <section class="cta-section">
            <div class="container">
                <a href="https://forms.gle/JqLpf7MfN85LkCYb8" class="cta-button pulse" target="_blank">Get Early Premium Access</a>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-links">
                <a href="#" class="footer-link">Privacy Policy</a>
                <a href="mailto:contact@enspire.lol" class="footer-link">Contact Us</a>
            </div>
            <div class="copyright">© 2025 Enspire. All rights reserved.</div>
        </div>
    </footer>

    <script>
        // Add interactive animations on scroll
        document.addEventListener('DOMContentLoaded', function() {
            // Add scroll event for future elements
            window.addEventListener('scroll', function() {
                // This can be extended for other elements
            });
            
            // Add hover effect for hero images
            const heroImages = document.querySelectorAll('.hero-img');
            heroImages.forEach(img => {
                img.addEventListener('mouseenter', () => {
                    img.style.transform = 'translateY(-8px)';
                });
                
                img.addEventListener('mouseleave', () => {
                    img.style.transform = 'translateY(0)';
                });
            });
        });
    </script>
</body>
</html>
